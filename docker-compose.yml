services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: techpulse_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-techpulse}
      POSTGRES_USER: ${POSTGRES_USER:-techpulseuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-techpulseuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - techpulse_network

  # Redis (Celery Broker)
  redis:
    image: redis:7-alpine
    container_name: techpulse_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - techpulse_network

  # Django Backend
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techpulse_web
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-please-change-this-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-techpulseuser}:${POSTGRES_PASSWORD:-changeme123}@db:5432/${POSTGRES_DB:-techpulse}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - techpulse_network

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techpulse_celery_worker
    restart: unless-stopped
    command: celery -A config worker -l info --pool=solo
    volumes:
      - .:/app
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-please-change-this-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-techpulseuser}:${POSTGRES_PASSWORD:-changeme123}@db:5432/${POSTGRES_DB:-techpulse}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web
    networks:
      - techpulse_network

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techpulse_celery_beat
    restart: unless-stopped
    command: celery -A config beat -l info
    volumes:
      - .:/app
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-please-change-this-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-techpulseuser}:${POSTGRES_PASSWORD:-changeme123}@db:5432/${POSTGRES_DB:-techpulse}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web
    networks:
      - techpulse_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: techpulse_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - techpulse_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  techpulse_network:
    driver: bridge